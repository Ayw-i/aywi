<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Are Ya Winning, Isles?</title>
  <style>
    body {
      background-color: #000000;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #sound-toggle {
      position: fixed;
      top: 12px;
      left: 12px;
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 100;
    }

    #main {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 18pt;
      margin-bottom: 6px;
    }

    #site-header,
    .fade-section {
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #site-header.visible,
    .fade-section.visible {
      opacity: 1;
    }

    nav {
      margin-bottom: 30px;
    }

    nav a {
      color: white;
      text-decoration: underline;
      margin: 0 8px;
      font-size: 11pt;
    }

    #mood-image {
      max-width: 50%;
      display: block;
      margin: 0 auto;
    }

    #mood-headline {
      font-size: 72pt;
      font-weight: bold;
      margin: 16px 0 30px 0;
      line-height: 1;
    }

    #game-headline {
      font-size: 11pt;
      margin: 12px 0;
      text-align: left;
    }

    hr {
      border: none;
      border-top: 1px solid white;
      margin: 40px 0;
    }

    h2 {
      text-align: left;
      font-size: 18pt;
      margin: 30px 0 6px 0;
      text-transform: uppercase;
    }

    h3 {
      text-align: left;
      font-size: 11pt;
      margin: 6px 0 4px 0;
      text-transform: uppercase;
      font-weight: normal;
      opacity: 0.8;
    }

    .sort-ind {
      display: inline-block;
      width: 14px;
      text-align: right;
      font-size: 9pt;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      text-align: left;
    }

    th, td {
      border: 1px solid white;
      padding: 4px 8px;
    }

    th {
      background-color: rgba(255, 255, 255, 0.15);
    }

    a {
      color: white;
    }

    #footer {
      font-size: 9pt;
      margin-top: 50px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<button id="sound-toggle" title="Toggle sound">&#9654;</button>

<audio id="bg-audio" loop></audio>

<div id="main">

  <div id="site-header">
    <h1>Are Ya Winning, Isles?</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="season.html">Season</a>
      <a href="schedule.html">Schedule</a>
      <a href="playoffs.html">Playoffs</a>
    <a href="stats.html">Stats</a>
      <a href="about.html">About</a>
    </nav>
  </div>

  <!-- MOOD SECTION — populated by detectAndRenderState() -->
  <div id="mood-section">
    <img id="mood-image" src="" alt="" style="display:none;">
    <div id="mood-headline"></div>
    <div id="mood-sub" style="font-size:10pt;opacity:0.8;margin-top:-20px;margin-bottom:10px;display:none;"></div>
    <div id="live-scoreboard"></div>
  </div>

  <!-- GAME SECTION — shown in Sorover/Clinched states; empty otherwise -->
  <div id="game-section" class="fade-section">
    <hr>
    <p id="game-headline"></p>
  </div>

  <!-- PERSISTENT SECTION -->
  <hr class="fade-section">

  <div class="fade-section">
    <h2>Islanders News</h2>
    <table>
      <thead>
        <tr>
          <th>Headline</th>
          <th>Site</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody id="news-tbody">
        <tr><td colspan="3">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="fade-section">
    <h2>Stats</h2>
    <h3>Forwards</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GP</th>
          <th>G</th>
          <th>A</th>
          <th>PTS</th>
          <th>+/-</th>
        </tr>
      </thead>
      <tbody id="forwards-tbody">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="fade-section">
    <h3>Defensemen</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GP</th>
          <th>G</th>
          <th>A</th>
          <th>PTS</th>
          <th>+/-</th>
        </tr>
      </thead>
      <tbody id="defensemen-tbody">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="fade-section">
    <h3>Goalies</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GP</th>
          <th>W</th>
          <th>L</th>
          <th>GAA</th>
          <th>SV%</th>
        </tr>
      </thead>
      <tbody id="goalies-tbody">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <p id="footer">Last updated: —</p>

</div>

<script src="js/utils.js"></script>
<script src="js/state.js"></script>
<script src="js/live-game.js"></script>
<script src="js/news.js"></script>
<script src="js/roster.js"></script>
<script src="js/main.js"></script>

<!-- DEV ONLY — remove before production -->
<script src="dev.js"></script>

</body>
</html>
