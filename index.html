<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Are Ya Winning, Isles?</title>
  <style>
    body {
      background-color: #000000;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #sound-toggle {
      position: fixed;
      top: 12px;
      left: 12px;
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 100;
    }

    #main {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 18pt;
      margin-bottom: 6px;
    }

    #site-header,
    .fade-section {
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #site-header.visible,
    .fade-section.visible {
      opacity: 1;
    }

    nav {
      margin-bottom: 30px;
    }

    nav a {
      color: white;
      text-decoration: underline;
      margin: 0 8px;
      font-size: 11pt;
    }

    #mood-image {
      max-width: 50%;
      display: block;
      margin: 0 auto;
    }

    #mood-headline {
      font-size: 72pt;
      font-weight: bold;
      margin: 16px 0 30px 0;
      line-height: 1;
    }

    hr {
      border: none;
      border-top: 1px solid white;
      margin: 40px 0;
    }

    h2 {
      text-align: left;
      font-size: 18pt;
      margin: 30px 0 6px 0;
      text-transform: uppercase;
    }

    h3 {
      text-align: left;
      font-size: 11pt;
      margin: 6px 0 4px 0;
      text-transform: uppercase;
      font-weight: normal;
      opacity: 0.8;
    }

    .sort-ind {
      display: inline-block;
      width: 14px;
      text-align: right;
      font-size: 9pt;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      text-align: left;
    }

    th, td {
      border: 1px solid white;
      padding: 4px 8px;
    }

    th {
      background-color: rgba(255, 255, 255, 0.15);
    }

    a {
      color: white;
    }

    #footer {
      font-size: 9pt;
      margin-top: 50px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<button id="sound-toggle" title="Toggle sound">&#9654;</button>

<audio id="bg-audio" loop></audio>

<div id="main">

  <div id="site-header">
    <h1>Are Ya Winning, Isles?</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="season.html">Season</a>
      <a href="schedule.html">Schedule</a>
      <a href="stats.html">Stats</a>
      <a href="about.html">About</a>
    </nav>
  </div>

  <!-- MOOD SECTION — populated by detectAndRenderState() -->
  <div id="mood-section">
    <img id="mood-image" src="" alt="" style="display:none;">
    <div id="mood-headline"></div>
  </div>

  <!-- PERSISTENT SECTION -->
  <hr class="fade-section">

  <div class="fade-section">
    <h2>Islanders News</h2>
    <table>
      <thead>
        <tr>
          <th>Headline</th>
          <th>Site</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody id="news-tbody">
        <tr><td colspan="3">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="fade-section">
    <h2>Stats</h2>
    <h3>Forwards</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GP</th>
          <th>G</th>
          <th>A</th>
          <th>PTS</th>
          <th>+/-</th>
        </tr>
      </thead>
      <tbody id="forwards-tbody">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="fade-section">
    <h3>Defensemen</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GP</th>
          <th>G</th>
          <th>A</th>
          <th>PTS</th>
          <th>+/-</th>
        </tr>
      </thead>
      <tbody id="defensemen-tbody">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="fade-section">
    <h3>Goalies</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GP</th>
          <th>W</th>
          <th>L</th>
          <th>GAA</th>
          <th>SV%</th>
        </tr>
      </thead>
      <tbody id="goalies-tbody">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <p id="footer">Last updated: —</p>

</div>

<script>
  const audio = document.getElementById('bg-audio');
  const toggle = document.getElementById('sound-toggle');
  const siteHeader = document.getElementById('site-header');

  // Update toggle icon based on actual playback state
  function syncToggle() {
    toggle.innerHTML = audio.paused ? '&#9654;' : '&#9646;&#9646;';
  }

  audio.addEventListener('play', syncToggle);
  audio.addEventListener('pause', syncToggle);

  toggle.addEventListener('click', function () {
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  });

  const fadeSections = document.querySelectorAll('.fade-section');

  // Observer is created but NOT started until user interacts
  const observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  let observing = false;
  function startObserving() {
    if (!observing) {
      observing = true;
      fadeSections.forEach(function (section) {
        observer.observe(section);
      });
    }
  }

  const WORKER = 'https://nhl-proxy.aywi.workers.dev';

  // --- State definitions ---
  // Each state drives background, image, headline, audio, and fade behaviour.
  // Win/loss/live/pregame headlines are dynamic and set by detectAndRenderState().

  const STATES = {
    sorover: {
      background: '#2bae66',
      image: 'assets/sorover.png',
      headline: "IT'S SOROVER",
      headlineLink: null,
      audioSrc: 'assets/only%20posers%20fall%20in%20love.mp3',
      fades: true,
    },
    outside_in: {
      background: '#000000',
      image: 'assets/now_im_on_the_outside.png',
      headline: 'OUTSIDE IN',
      headlineLink: 'playoffs.html',
      audioSrc: null,
      fades: false,
    },
    win: {
      background: '#000000',
      image: 'assets/lee.png',
      headline: '',
      headlineLink: null,
      audioSrc: null,
      fades: true,
    },
    loss: {
      background: '#000000',
      image: 'assets/pov_sasha_daet_tebe_L.png',
      headline: '',
      headlineLink: null,
      audioSrc: null,
      fades: true,
    },
    live: {
      background: '#000000',
      image: null,
      headline: '',
      headlineLink: null,
      audioSrc: null,
      fades: true,
    },
    pregame: {
      background: '#000000',
      image: null,
      headline: '',
      headlineLink: null,
      audioSrc: null,
      fades: true,
    },
    offseason: {
      background: '#000000',
      image: null,
      headline: '',
      headlineLink: null,
      audioSrc: null,
      fades: true,
    },
  };

  // Render a named state onto the page.
  // Pass optional overrides: { headline, headlineLink, image } for dynamic states.
  function renderMoodState(stateName, overrides) {
    const base = STATES[stateName];
    if (!base) return;
    const state = Object.assign({}, base, overrides || {});

    document.body.style.backgroundColor = state.background;

    const img = document.getElementById('mood-image');
    if (state.image) {
      img.src = state.image;
      img.style.display = 'block';
    } else {
      img.style.display = 'none';
    }

    const headline = document.getElementById('mood-headline');
    if (state.headlineLink) {
      headline.innerHTML =
        '<a href="' + state.headlineLink + '" style="color:white;text-decoration:underline;">' +
        state.headline + '</a>';
    } else {
      headline.textContent = state.headline;
    }

    const audio = document.getElementById('bg-audio');
    const toggle = document.getElementById('sound-toggle');
    audio.pause();
    if (state.audioSrc) {
      audio.src = state.audioSrc;
      toggle.style.display = 'block';
      audio.play().catch(function () {});
    } else {
      audio.src = '';
      toggle.style.display = 'none';
    }

    if (!state.fades) {
      document.getElementById('site-header').classList.add('visible');
      document.querySelectorAll('.fade-section').forEach(function (el) {
        el.classList.add('visible');
      });
    }
  }

  // --- Config cache ---

  let appConfig = null;
  async function getConfig() {
    if (!appConfig) {
      const res = await fetch('config.json');
      appConfig = await res.json();
    }
    return appConfig;
  }

  // --- Date formatting ---

  function ordinalSuffix(d) {
    if (d >= 11 && d <= 13) return 'th';
    return ['th','st','nd','rd'][d % 10] || 'th';
  }

  function formatOrdinalDate(dateStr) {
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const d = new Date(dateStr + 'T12:00:00');
    return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' +
           d.getDate() + ordinalSuffix(d.getDate());
  }

  function formatNextGameDay(dateStr) {
    const game     = new Date(dateStr + 'T12:00:00');
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    if (game.toDateString() === tomorrow.toDateString()) return 'tomorrow';
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    return 'on ' + days[game.getDay()];
  }

  // --- NYI game helpers ---

  function isNYIGame(game) {
    return game.awayTeam.abbrev === 'NYI' || game.homeTeam.abbrev === 'NYI';
  }

  function nyiDiff(game) {
    const nyiScore = game.awayTeam.abbrev === 'NYI'
      ? game.awayTeam.score : game.homeTeam.score;
    const oppScore = game.awayTeam.abbrev === 'NYI'
      ? game.homeTeam.score : game.awayTeam.score;
    return nyiScore - oppScore;
  }

  function nyiWon(game) { return nyiDiff(game) > 0; }

  function wasOTorSO(game) {
    return game.gameOutcome &&
      (game.gameOutcome.lastPeriodType === 'OT' ||
       game.gameOutcome.lastPeriodType === 'SO');
  }

  // --- Response text from config ---

  function getResponseText(config, situation, params) {
    const r = config.responses;
    params = params || {};
    switch (situation) {
      case 'live_leading': {
        const d = params.diff;
        return d >= 4 ? r.live.leading['4plus'] : r.live.leading[String(d)];
      }
      case 'live_tied':
        return r.live.tied;
      case 'live_trailing': {
        const d = Math.abs(params.diff);
        if (d >= 4) return r.live.trailing['4plus']
          .replace('{nextHomeGame}', params.nextHomeGame || '—');
        return r.live.trailing[String(d)];
      }
      case 'postgame_win':      return r.postgame.win;
      case 'postgame_loss_reg': return r.postgame.loss_regulation;
      case 'postgame_loss_ot':  return r.postgame.loss_ot_so;
      case 'between_win':
        return r.between_games.last_was_win
          .replace('{nextGameDay}', params.nextGameDay || 'soon');
      case 'between_loss':
        return r.between_games.last_was_loss
          .replace('{nextGameDay}', params.nextGameDay || 'soon');
      default: return '';
    }
  }

  // --- State application (pure — works with real or mock data) ---

  function applyState(data) {
    const { standings, todayGames, monthGames, config } = data;

    // 1. Playoff game today → Outside In
    if (todayGames.some(function (g) { return g.gameType === 3; })) {
      renderMoodState('outside_in');
      return;
    }

    // 2. NYI eliminated → Sorover
    const nyi = standings.standings.find(function (t) {
      return t.teamAbbrev.default === 'NYI';
    });
    if (nyi && nyi.clinchIndicator === 'e') {
      renderMoodState('sorover');
      return;
    }

    // 3. Regular season — find NYI game today
    const nyiGame = todayGames.find(function (g) {
      return g.gameType === 2 && isNYIGame(g);
    });

    if (!nyiGame) {
      // Between games — find last result and next game from month schedule
      const completed = monthGames.filter(function (g) {
        return isNYIGame(g) && (g.gameState === 'OFF' || g.gameState === 'FINAL');
      });
      const upcoming = monthGames.filter(function (g) {
        return isNYIGame(g) && (g.gameState === 'FUT' || g.gameState === 'PRE');
      });

      const lastGame = completed[completed.length - 1] || null;
      const nextGame = upcoming[0] || null;
      const nextGameDay = nextGame ? formatNextGameDay(nextGame.gameDate) : 'soon';

      if (!lastGame) { renderMoodState('sorover'); return; }

      if (nyiWon(lastGame)) {
        renderMoodState('win', {
          headline: getResponseText(config, 'between_win', { nextGameDay: nextGameDay }),
        });
      } else {
        renderMoodState('loss', {
          headline: getResponseText(config, 'between_loss', { nextGameDay: nextGameDay }),
        });
      }
      return;
    }

    const state = nyiGame.gameState;

    // 4. Pre-game
    if (state === 'FUT' || state === 'PRE') {
      renderMoodState('pregame', { headline: 'Game today.' });
      return;
    }

    // 5. Live
    if (state === 'LIVE' || state === 'CRIT') {
      const diff = nyiDiff(nyiGame);
      let situation;
      if (diff > 0)      situation = 'live_leading';
      else if (diff < 0) situation = 'live_trailing';
      else               situation = 'live_tied';

      // Next home game for "down 4+" text
      const nextHome = (monthGames || []).find(function (g) {
        return isNYIGame(g) && g.homeTeam.abbrev === 'NYI' &&
               (g.gameState === 'FUT' || g.gameState === 'PRE');
      });
      const nextHomeGame = nextHome ? formatOrdinalDate(nextHome.gameDate) : '—';

      const headline = getResponseText(config, situation, {
        diff: diff,
        nextHomeGame: nextHomeGame,
      });

      const img = diff >= 0 ? 'assets/lee.png' : 'assets/pov_sasha_daet_tebe_L.png';
      renderMoodState('live', { headline: headline, image: img });
      return;
    }

    // 6. Final
    if (state === 'OFF' || state === 'FINAL') {
      if (nyiWon(nyiGame)) {
        renderMoodState('win', {
          headline: getResponseText(config, 'postgame_win'),
        });
      } else if (wasOTorSO(nyiGame)) {
        renderMoodState('loss', {
          headline: getResponseText(config, 'postgame_loss_ot'),
        });
      } else {
        renderMoodState('loss', {
          headline: getResponseText(config, 'postgame_loss_reg'),
        });
      }
    }
  }

  // --- State detection (fetches real data or uses mock) ---

  async function detectAndRenderState(mockData) {
    try {
      const config = await getConfig();

      let standings, todayGames, monthGames;

      if (mockData) {
        standings  = mockData.standings;
        todayGames = mockData.todayGames;
        monthGames = mockData.monthGames || [];
      } else {
        const [standingsRes, scheduleRes, monthRes] = await Promise.all([
          fetch(WORKER + '/v1/standings/now'),
          fetch(WORKER + '/v1/score/now'),
          fetch(WORKER + '/v1/club-schedule/NYI/month/now'),
        ]);
        standings  = await standingsRes.json();
        const schedule = await scheduleRes.json();
        todayGames = schedule.games;
        const month = await monthRes.json();
        monthGames = month.games || [];
      }

      applyState({ standings, todayGames, monthGames, config });

    } catch (err) {
      console.error('State detection failed:', err);
      renderMoodState('sorover');
    }
  }

  detectAndRenderState();

  // --- News ---

  function parseFeed(xmlText, sourceName) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    const articles = [];

    // Detect Atom vs RSS by root element
    const isAtom = doc.querySelector('feed') !== null;

    const items = isAtom
      ? Array.from(doc.querySelectorAll('entry'))
      : Array.from(doc.querySelectorAll('item'));

    items.forEach(function (item) {
      const headline = item.querySelector('title')
        ? item.querySelector('title').textContent.trim() : '';

      let url = '';
      if (isAtom) {
        const linkEl = item.querySelector('link[rel="alternate"]') || item.querySelector('link');
        url = linkEl ? (linkEl.getAttribute('href') || linkEl.textContent.trim()) : '';
      } else {
        const linkEl = item.querySelector('link');
        url = linkEl ? linkEl.textContent.trim() : '';
      }

      const dateStr = isAtom
        ? (item.querySelector('published') || item.querySelector('updated'))?.textContent
        : item.querySelector('pubDate')?.textContent;

      articles.push({
        headline: headline,
        url: url,
        site: sourceName,
        date: dateStr ? new Date(dateStr) : new Date(0),
      });
    });

    return articles;
  }

  async function loadNews() {
    try {
      const configRes = await fetch('config.json');
      const config = await configRes.json();
      const { sources, maxPerSource } = config.news;

      const allArticles = [];

      await Promise.all(sources.map(async function (source) {
        try {
          const res = await fetch(WORKER + '/feeds/' + source.key);
          const xml = await res.text();
          const articles = parseFeed(xml, source.name).slice(0, maxPerSource);
          allArticles.push(...articles);
        } catch (e) {
          console.warn('Failed to load feed:', source.key, e);
        }
      }));

      // Sort all articles by date, newest first
      allArticles.sort(function (a, b) { return b.date - a.date; });

      const tbody = document.getElementById('news-tbody');
      if (allArticles.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3">No news available.</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      allArticles.forEach(function (article) {
        const row = document.createElement('tr');
        row.innerHTML =
          '<td>' + article.headline + '</td>' +
          '<td>' + article.site + '</td>' +
          '<td><a href="' + article.url + '" target="_blank" rel="noopener">Read</a></td>';
        tbody.appendChild(row);
      });

    } catch (err) {
      console.error('Failed to load news:', err);
      document.getElementById('news-tbody').innerHTML =
        '<tr><td colspan="3">Could not load news.</td></tr>';
    }
  }

  loadNews();

  // --- Roster stats ---

  function makeSortable(table) {
    const headers = table.querySelectorAll('thead th');
    headers.forEach(function (th, colIndex) {
      // Wrap label and indicator in separate spans so width stays fixed
      th.innerHTML =
        '<span class="col-label">' + th.textContent + '</span>' +
        '<span class="sort-ind"></span>';
      th.style.cursor = 'pointer';
      th.style.whiteSpace = 'nowrap';

      th.addEventListener('click', function () {
        const tbody = table.querySelector('tbody');
        const rows = Array.from(tbody.querySelectorAll('tr'));

        // Default to descending on first click
        const dir = th.dataset.dir === 'desc' ? 'asc' : 'desc';

        // Reset all indicators
        headers.forEach(function (h) {
          h.dataset.dir = '';
          h.querySelector('.sort-ind').textContent = '';
        });

        th.dataset.dir = dir;
        th.querySelector('.sort-ind').textContent = dir === 'asc' ? '▲' : '▼';

        rows.sort(function (a, b) {
          const aVal = a.cells[colIndex].textContent.trim();
          const bVal = b.cells[colIndex].textContent.trim();
          const aNum = parseFloat(aVal.replace('+', ''));
          const bNum = parseFloat(bVal.replace('+', ''));
          const result = (!isNaN(aNum) && !isNaN(bNum))
            ? aNum - bNum
            : aVal.localeCompare(bVal);
          return dir === 'asc' ? result : -result;
        });

        rows.forEach(function (row) { tbody.appendChild(row); });
      });
    });
  }

  function formatPlusMinus(val) {
    if (val > 0) return '+' + val;
    return String(val);
  }

  function formatGAA(val) {
    return val.toFixed(2);
  }

  function formatSVP(val) {
    // Hockey convention: .917 not 0.917
    return '.' + val.toFixed(3).slice(2);
  }

  function renderSkaterTable(tbodyId, players) {
    const tbody = document.getElementById(tbodyId);
    tbody.innerHTML = '';
    players.forEach(function (p) {
      const row = document.createElement('tr');
      row.innerHTML =
        '<td>' + p.firstName.default + ' ' + p.lastName.default + '</td>' +
        '<td>' + p.gamesPlayed + '</td>' +
        '<td>' + p.goals + '</td>' +
        '<td>' + p.assists + '</td>' +
        '<td>' + p.points + '</td>' +
        '<td>' + formatPlusMinus(p.plusMinus) + '</td>';
      tbody.appendChild(row);
    });
  }

  function renderGoalieTable(goalies) {
    const tbody = document.getElementById('goalies-tbody');
    tbody.innerHTML = '';
    goalies.forEach(function (g) {
      const row = document.createElement('tr');
      row.innerHTML =
        '<td>' + g.firstName.default + ' ' + g.lastName.default + '</td>' +
        '<td>' + g.gamesPlayed + '</td>' +
        '<td>' + g.wins + '</td>' +
        '<td>' + g.losses + '</td>' +
        '<td>' + formatGAA(g.goalsAgainstAverage) + '</td>' +
        '<td>' + formatSVP(g.savePercentage) + '</td>';
      tbody.appendChild(row);
    });
  }

  async function loadRosterStats() {
    try {
      const res = await fetch(WORKER + '/v1/club-stats/NYI/20252026/2');
      const data = await res.json();

      const forwards = data.skaters
        .filter(function (p) { return ['C', 'L', 'R'].includes(p.positionCode); })
        .sort(function (a, b) { return b.points - a.points; });

      const defensemen = data.skaters
        .filter(function (p) { return p.positionCode === 'D'; })
        .sort(function (a, b) { return b.points - a.points; });

      const goalies = data.goalies
        .sort(function (a, b) { return b.wins - a.wins; });

      renderSkaterTable('forwards-tbody', forwards);
      renderSkaterTable('defensemen-tbody', defensemen);
      renderGoalieTable(goalies);

      ['forwards-tbody', 'defensemen-tbody', 'goalies-tbody'].forEach(function (id) {
        makeSortable(document.getElementById(id).closest('table'));
      });

      document.getElementById('footer').textContent =
        'Last updated: ' + new Date().toLocaleString();

    } catch (err) {
      console.error('Failed to load roster stats:', err);
      ['forwards-tbody', 'defensemen-tbody', 'goalies-tbody'].forEach(function (id) {
        document.getElementById(id).innerHTML =
          '<tr><td colspan="6">Could not load data.</td></tr>';
      });
    }
  }

  loadRosterStats();

  // --- Fade logic ---

  // Header fades in on first scroll or mouseover; also kick off section observer
  function revealHeader() {
    siteHeader.classList.add('visible');
    startObserving();
  }

  window.addEventListener('scroll', revealHeader, { once: true });
  siteHeader.addEventListener('mouseenter', revealHeader, { once: true });

  // Mouseover on any section fades it in directly (before or after scroll)
  fadeSections.forEach(function (section) {
    section.addEventListener('mouseenter', function () {
      section.classList.add('visible');
      observer.unobserve(section);
    }, { once: true });
  });
</script>
