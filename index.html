<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Are Ya Winning, Isles?</title>
  <style>
    body {
      background-color: #2bae66;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #sound-toggle {
      position: fixed;
      top: 12px;
      left: 12px;
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 100;
    }

    #main {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 18pt;
      margin-bottom: 6px;
    }

    #site-header,
    .fade-section {
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #site-header.visible,
    .fade-section.visible {
      opacity: 1;
    }

    nav {
      margin-bottom: 30px;
    }

    nav a {
      color: white;
      text-decoration: underline;
      margin: 0 8px;
      font-size: 11pt;
    }

    #mood-image {
      max-width: 50%;
      display: block;
      margin: 0 auto;
    }

    #mood-headline {
      font-size: 72pt;
      font-weight: bold;
      margin: 16px 0 30px 0;
      line-height: 1;
    }

    hr {
      border: none;
      border-top: 1px solid white;
      margin: 40px 0;
    }

    h2 {
      text-align: left;
      font-size: 18pt;
      margin: 30px 0 6px 0;
      text-transform: uppercase;
    }

    h3 {
      text-align: left;
      font-size: 11pt;
      margin: 6px 0 4px 0;
      text-transform: uppercase;
      font-weight: normal;
      opacity: 0.8;
    }

    .sort-ind {
      display: inline-block;
      width: 14px;
      text-align: right;
      font-size: 9pt;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      text-align: left;
    }

    th, td {
      border: 1px solid white;
      padding: 4px 8px;
    }

    th {
      background-color: rgba(255, 255, 255, 0.15);
    }

    a {
      color: white;
    }

    #footer {
      font-size: 9pt;
      margin-top: 50px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<button id="sound-toggle" title="Toggle sound">&#9654;</button>

<audio id="bg-audio" autoplay loop>
  <source src="assets/only%20posers%20fall%20in%20love.mp3" type="audio/mpeg">
</audio>

<div id="main">

  <div id="site-header">
    <h1>Are Ya Winning, Isles?</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="season.html">Season</a>
      <a href="schedule.html">Schedule</a>
      <a href="stats.html">Stats</a>
      <a href="about.html">About</a>
    </nav>
  </div>

  <!-- MOOD SECTION -->
  <div id="mood-section">
    <img id="mood-image" src="assets/sorover.png" alt="It's Sorover">
    <div id="mood-headline">IT'S SOROVER</div>
  </div>

  <!-- PERSISTENT SECTION -->
  <hr class="fade-section">

  <div class="fade-section">
    <h2>Islanders News</h2>
    <table>
      <thead>
        <tr>
          <th>Headline</th>
          <th>Site</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody id="news-tbody">
        <tr><td colspan="3">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="fade-section">
    <h2>Stats</h2>
    <h3>Forwards</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GP</th>
          <th>G</th>
          <th>A</th>
          <th>PTS</th>
          <th>+/-</th>
        </tr>
      </thead>
      <tbody id="forwards-tbody">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="fade-section">
    <h3>Defensemen</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GP</th>
          <th>G</th>
          <th>A</th>
          <th>PTS</th>
          <th>+/-</th>
        </tr>
      </thead>
      <tbody id="defensemen-tbody">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="fade-section">
    <h3>Goalies</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>GP</th>
          <th>W</th>
          <th>L</th>
          <th>GAA</th>
          <th>SV%</th>
        </tr>
      </thead>
      <tbody id="goalies-tbody">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <p id="footer">Last updated: —</p>

</div>

<script>
  const audio = document.getElementById('bg-audio');
  const toggle = document.getElementById('sound-toggle');
  const siteHeader = document.getElementById('site-header');

  // Update toggle icon based on actual playback state
  function syncToggle() {
    toggle.innerHTML = audio.paused ? '&#9654;' : '&#9646;&#9646;';
  }

  audio.addEventListener('play', syncToggle);
  audio.addEventListener('pause', syncToggle);

  toggle.addEventListener('click', function () {
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  });

  const fadeSections = document.querySelectorAll('.fade-section');

  // Observer is created but NOT started until user interacts
  const observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  let observing = false;
  function startObserving() {
    if (!observing) {
      observing = true;
      fadeSections.forEach(function (section) {
        observer.observe(section);
      });
    }
  }

  const WORKER = 'https://nhl-proxy.aywi.workers.dev';

  // --- News ---

  function parseFeed(xmlText, sourceName) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    const articles = [];

    // Detect Atom vs RSS by root element
    const isAtom = doc.querySelector('feed') !== null;

    const items = isAtom
      ? Array.from(doc.querySelectorAll('entry'))
      : Array.from(doc.querySelectorAll('item'));

    items.forEach(function (item) {
      const headline = item.querySelector('title')
        ? item.querySelector('title').textContent.trim() : '';

      let url = '';
      if (isAtom) {
        const linkEl = item.querySelector('link[rel="alternate"]') || item.querySelector('link');
        url = linkEl ? (linkEl.getAttribute('href') || linkEl.textContent.trim()) : '';
      } else {
        const linkEl = item.querySelector('link');
        url = linkEl ? linkEl.textContent.trim() : '';
      }

      const dateStr = isAtom
        ? (item.querySelector('published') || item.querySelector('updated'))?.textContent
        : item.querySelector('pubDate')?.textContent;

      articles.push({
        headline: headline,
        url: url,
        site: sourceName,
        date: dateStr ? new Date(dateStr) : new Date(0),
      });
    });

    return articles;
  }

  async function loadNews() {
    try {
      const configRes = await fetch('config.json');
      const config = await configRes.json();
      const { sources, maxPerSource } = config.news;

      const allArticles = [];

      await Promise.all(sources.map(async function (source) {
        try {
          const res = await fetch(WORKER + '/feeds/' + source.key);
          const xml = await res.text();
          const articles = parseFeed(xml, source.name).slice(0, maxPerSource);
          allArticles.push(...articles);
        } catch (e) {
          console.warn('Failed to load feed:', source.key, e);
        }
      }));

      // Sort all articles by date, newest first
      allArticles.sort(function (a, b) { return b.date - a.date; });

      const tbody = document.getElementById('news-tbody');
      if (allArticles.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3">No news available.</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      allArticles.forEach(function (article) {
        const row = document.createElement('tr');
        row.innerHTML =
          '<td>' + article.headline + '</td>' +
          '<td>' + article.site + '</td>' +
          '<td><a href="' + article.url + '" target="_blank" rel="noopener">Read</a></td>';
        tbody.appendChild(row);
      });

    } catch (err) {
      console.error('Failed to load news:', err);
      document.getElementById('news-tbody').innerHTML =
        '<tr><td colspan="3">Could not load news.</td></tr>';
    }
  }

  loadNews();

  // --- Roster stats ---

  function makeSortable(table) {
    const headers = table.querySelectorAll('thead th');
    headers.forEach(function (th, colIndex) {
      // Wrap label and indicator in separate spans so width stays fixed
      th.innerHTML =
        '<span class="col-label">' + th.textContent + '</span>' +
        '<span class="sort-ind"></span>';
      th.style.cursor = 'pointer';
      th.style.whiteSpace = 'nowrap';

      th.addEventListener('click', function () {
        const tbody = table.querySelector('tbody');
        const rows = Array.from(tbody.querySelectorAll('tr'));

        // Default to descending on first click
        const dir = th.dataset.dir === 'desc' ? 'asc' : 'desc';

        // Reset all indicators
        headers.forEach(function (h) {
          h.dataset.dir = '';
          h.querySelector('.sort-ind').textContent = '';
        });

        th.dataset.dir = dir;
        th.querySelector('.sort-ind').textContent = dir === 'asc' ? '▲' : '▼';

        rows.sort(function (a, b) {
          const aVal = a.cells[colIndex].textContent.trim();
          const bVal = b.cells[colIndex].textContent.trim();
          const aNum = parseFloat(aVal.replace('+', ''));
          const bNum = parseFloat(bVal.replace('+', ''));
          const result = (!isNaN(aNum) && !isNaN(bNum))
            ? aNum - bNum
            : aVal.localeCompare(bVal);
          return dir === 'asc' ? result : -result;
        });

        rows.forEach(function (row) { tbody.appendChild(row); });
      });
    });
  }

  function formatPlusMinus(val) {
    if (val > 0) return '+' + val;
    return String(val);
  }

  function formatGAA(val) {
    return val.toFixed(2);
  }

  function formatSVP(val) {
    // Hockey convention: .917 not 0.917
    return '.' + val.toFixed(3).slice(2);
  }

  function renderSkaterTable(tbodyId, players) {
    const tbody = document.getElementById(tbodyId);
    tbody.innerHTML = '';
    players.forEach(function (p) {
      const row = document.createElement('tr');
      row.innerHTML =
        '<td>' + p.firstName.default + ' ' + p.lastName.default + '</td>' +
        '<td>' + p.gamesPlayed + '</td>' +
        '<td>' + p.goals + '</td>' +
        '<td>' + p.assists + '</td>' +
        '<td>' + p.points + '</td>' +
        '<td>' + formatPlusMinus(p.plusMinus) + '</td>';
      tbody.appendChild(row);
    });
  }

  function renderGoalieTable(goalies) {
    const tbody = document.getElementById('goalies-tbody');
    tbody.innerHTML = '';
    goalies.forEach(function (g) {
      const row = document.createElement('tr');
      row.innerHTML =
        '<td>' + g.firstName.default + ' ' + g.lastName.default + '</td>' +
        '<td>' + g.gamesPlayed + '</td>' +
        '<td>' + g.wins + '</td>' +
        '<td>' + g.losses + '</td>' +
        '<td>' + formatGAA(g.goalsAgainstAverage) + '</td>' +
        '<td>' + formatSVP(g.savePercentage) + '</td>';
      tbody.appendChild(row);
    });
  }

  async function loadRosterStats() {
    try {
      const res = await fetch(WORKER + '/v1/club-stats/NYI/20252026/2');
      const data = await res.json();

      const forwards = data.skaters
        .filter(function (p) { return ['C', 'L', 'R'].includes(p.positionCode); })
        .sort(function (a, b) { return b.points - a.points; });

      const defensemen = data.skaters
        .filter(function (p) { return p.positionCode === 'D'; })
        .sort(function (a, b) { return b.points - a.points; });

      const goalies = data.goalies
        .sort(function (a, b) { return b.wins - a.wins; });

      renderSkaterTable('forwards-tbody', forwards);
      renderSkaterTable('defensemen-tbody', defensemen);
      renderGoalieTable(goalies);

      ['forwards-tbody', 'defensemen-tbody', 'goalies-tbody'].forEach(function (id) {
        makeSortable(document.getElementById(id).closest('table'));
      });

      document.getElementById('footer').textContent =
        'Last updated: ' + new Date().toLocaleString();

    } catch (err) {
      console.error('Failed to load roster stats:', err);
      ['forwards-tbody', 'defensemen-tbody', 'goalies-tbody'].forEach(function (id) {
        document.getElementById(id).innerHTML =
          '<tr><td colspan="6">Could not load data.</td></tr>';
      });
    }
  }

  loadRosterStats();

  // --- Fade logic ---

  // Header fades in on first scroll or mouseover; also kick off section observer
  function revealHeader() {
    siteHeader.classList.add('visible');
    startObserving();
  }

  window.addEventListener('scroll', revealHeader, { once: true });
  siteHeader.addEventListener('mouseenter', revealHeader, { once: true });

  // Mouseover on any section fades it in directly (before or after scroll)
  fadeSections.forEach(function (section) {
    section.addEventListener('mouseenter', function () {
      section.classList.add('visible');
      observer.unobserve(section);
    }, { once: true });
  });
</script>


<!-- DEV ONLY — remove before production -->
<script src="dev.js"></script>

</body>
</html>
