<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Season — Are Ya Winning, Isles?</title>
  <style>
    body {
      background-color: #000000;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #main {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 18pt;
      margin-bottom: 6px;
    }

    h2 {
      text-align: left;
      font-size: 13pt;
      margin: 0 0 12px 0;
      text-transform: uppercase;
    }

    nav {
      margin-bottom: 30px;
    }

    nav a {
      color: white;
      text-decoration: underline;
      margin: 0 8px;
      font-size: 11pt;
    }

    a {
      color: white;
    }

    hr {
      border: none;
      border-top: 1px solid white;
      margin: 40px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      text-align: left;
    }

    th, td {
      border: none;
      padding: 3px 8px;
    }
  </style>
</head>
<body>

<div id="main">

  <div id="nav"></div>
  <script src="js/nav.js"></script>

  <div id="season-table" style="text-align:left;opacity:0.5;font-size:10pt;">Loading...</div>

</div>

<script src="js/nhl-schedule.js"></script>
<script src="js/season-page.js"></script>

</body>
</html>
