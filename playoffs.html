<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playoffs — Are Ya Winning, Isles?</title>
  <style>
    body {
      background-color: #000000;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #main {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 18pt;
      margin-bottom: 6px;
    }

    h2 {
      text-align: left;
      font-size: 18pt;
      margin: 30px 0 12px 0;
      text-transform: uppercase;
    }

    nav {
      margin-bottom: 30px;
    }

    nav a {
      color: white;
      text-decoration: underline;
      margin: 0 8px;
      font-size: 11pt;
    }

    a {
      color: white;
    }

    hr {
      border: none;
      border-top: 1px solid white;
      margin: 40px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      text-align: left;
    }

    th, td {
      border: 1px solid white;
      padding: 4px 8px;
    }

    th {
      background-color: rgba(255, 255, 255, 0.15);
    }

    #footer {
      font-size: 9pt;
      margin-top: 50px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div id="main">

  <div id="nav"></div>
  <script src="js/nav.js"></script>

  <div id="season-picker" style="text-align:center;margin-bottom:16px;"></div>

  <div id="today-games-section">
    <h2>Today's Games</h2>
    <div id="today-games">Loading...</div>
    <hr>
  </div>

  <h2>Bracket</h2>
  <div style="font-size:8pt;opacity:0.6;margin-bottom:10px;">
    <span style="display:inline-block;width:16px;height:12px;background:linear-gradient(to bottom,#FFFF44 0px,#FFA500 3px,#555 3px);vertical-align:middle;margin-right:4px;"></span>OT win &nbsp;&nbsp;
    <span style="display:inline-block;width:16px;height:12px;background:linear-gradient(135deg,#555 78%,rgba(255,255,255,0.9) 78%);vertical-align:middle;margin-right:4px;"></span>Away win
  </div>
  <div id="bracket">Loading...</div>

  <p id="footer">Last updated: —</p>

</div>

<div id="playoff-tt" style="display:none;position:fixed;background:#111;border:1px solid #555;padding:8px 10px;z-index:999;pointer-events:none;white-space:nowrap;min-width:160px;">
  <div id="playoff-tt-score" style="font-size:10pt;font-weight:bold;"></div>
  <div id="playoff-tt-date"  style="font-size:8pt;opacity:0.6;margin-top:2px;"></div>
  <div id="playoff-tt-expand"></div>
</div>

<script src="js/utils.js"></script>
<script src="js/nhl-schedule.js"></script>
<script src="js/state.js"></script>
<script src="js/playoffs.js"></script>

</body>
</html>
